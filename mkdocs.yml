site_name: PyTorch-Wildlife
site_url: https://microsoft.github.io/Pytorch-Wildlife/
site_description: "PyTorch-Wildlife — unified open-source AI framework for camera-trap detection, species classification, and wildlife monitoring. Hosts MegaDetector and the Microsoft AI for Good Lab model zoo."
docs_dir: docs
site_dir: site
repo_url: https://github.com/microsoft/Pytorch-Wildlife
repo_name: microsoft/Pytorch-Wildlife
copyright: Copyright (c) 2023 Microsoft Corporation

theme:
  name: material
  custom_dir: overrides
  favicon: assets/cat.png
  logo: assets/cat.png
  icon:
    menu: material/menu
    alternate: material/translate
    search: material/magnify
    share: material/share-variant
    close: material/close
    top: material/arrow-up
    edit: material/pencil
    view: material/eye
    repo: fontawesome/brands/git-alt
    admonition:
      note: material/note
      abstract: material/lightbulb
      info: material/information
      tip: material/lightbulb-on
      success: material/check-circle
      question: material/help-circle
      warning: material/alert
      failure: material/alert-circle
      danger: material/alert-octagon
      bug: material/bug
      example: material/format-list-bulleted
      quote: material/format-quote-open
    tag:
      default: material/tag
      info: material/information
      warning: material/alert
      danger: material/alert-octagon
    previous: material/arrow-left
    next: material/arrow-right
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/paw-off
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/paw
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - toc.follow
    - navigation.top
    - search.suggest
    - search.share
    - navigation.footer

nav:
  - PyTorch-Wildlife:
    - Overview: index.md
    - Installation: installation.md
    - Model Zoo: model_zoo.md
    - Tags: tags.md
  - Cite Us: cite.md
  - Developer Guide: build_mkdocs.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - attr_list
  - sane_lists
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

plugins:
  - callouts
  - search
  - meta
  - tags
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
